name: Fetch Vel'Koz Masters

on:
  workflow_dispatch: {}
  schedule:
    # 매일 09:17 KST = 00:17 UTC (혼잡 시간대 회피)
    - cron: '17 0 * * *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetch script
        run: python scripts/fetch_velkoz_masters.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/velkoz_masters.json data/velkoz_masters_debug.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update velkoz masters data"
          git push
